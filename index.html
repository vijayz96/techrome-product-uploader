<!DOCTYPE html>
<html>
<head>
  <title>Techrome Product Upload</title>
  <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #111;
      color: white;
      text-align: center;
    }

    input, textarea, button {
      padding: 10px;
      margin: 10px;
      width: 250px;
      border-radius: 5px;
      border: none;
    }

    button {
      background: #00ff99;
      cursor: pointer;
      font-weight: bold;
    }

    #loginBox {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      flex-direction: column;
    }

    #mainContent {
      display: none;
    }
  </style>
</head>

<body>

<!-- LOGIN -->
<div id="loginBox">
  <h2>Admin Login</h2>
  <input type="password" id="adminPass" placeholder="Enter Password" />
  <button onclick="checkLogin()">Login</button>
</div>

<!-- MAIN -->
<div id="mainContent">

<h2>Techrome Product Upload</h2>

<input type="text" id="name" placeholder="Product Name" required><br>
<textarea id="description" placeholder="Description"></textarea><br>
<input type="number" id="price" placeholder="Price"><br>

<input type="file" id="imageFile" accept="image/*"><br>

<button onclick="submitProduct()">Submit Product</button>

<br><br>
<svg id="barcode"></svg>

</div>

<script>

const password = "tec123"; 

function checkLogin() {
  const input = document.getElementById("adminPass").value;
  if (input === password) {
    document.getElementById("loginBox").style.display = "none";
    document.getElementById("mainContent").style.display = "block";
  } else {
    alert("Wrong password");
  }
}

async function submitProduct() {

  const name = document.getElementById("name").value;
  const description = document.getElementById("description").value;
  const price = document.getElementById("price").value;
  const file = document.getElementById("imageFile").files[0];

  if (!file) {
    alert("Please select an image.");
    return;
  }

  const barcodeValue = "TEC" + Date.now();

  JsBarcode("#barcode", barcodeValue, {
    format: "CODE128",
    displayValue: true
  });

  // 🔥 Upload to Cloudinary
  const formData = new FormData();
  formData.append("file", file);
  formData.append("upload_preset", "techrome_upload");

  const cloudinaryResponse = await fetch(
    "https://api.cloudinary.com/v1_1/dly6ohy7j/image/upload",
    {
      method: "POST",
      body: formData
    }
  );

  const cloudinaryData = await cloudinaryResponse.json();
  const imageUrl = cloudinaryData.secure_url;

  // 🚀 Send to Make Webhook
  await fetch("https://hook.eu1.make.com/8if4qnhgeayp7gjo2vtn8oodvhy02bsf", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      name: name,
      description: description,
      price: price,
      image: imageUrl,
      barcode: barcodeValue,
      date: new Date().toLocaleString()
    })
  });

  alert("Product Uploaded Successfully!");

}

</script>

</body>
</html>
