<!DOCTYPE html>
<html>
<head>
  <title>motospec Product Upload</title>
  <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #111;
      color: white;
      text-align: center;
    }

    input, textarea, button {
      padding: 10px;
      margin: 10px;
      width: 250px;
      border-radius: 5px;
      border: none;
    }

    button {
      background: #00ff99;
      cursor: pointer;
      font-weight: bold;
    }

    #loginBox {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      flex-direction: column;
    }

    #mainContent {
      display: none;
    }
  </style>
</head>

<body>

<!-- LOGIN BOX -->
<div id="loginBox">
  <h2>Admin Login</h2>
  <input type="password" id="adminPass" placeholder="Enter Password" />
  <button onclick="checkLogin()">Login</button>
</div>

<!-- MAIN CONTENT -->
<div id="mainContent">

<h2>motospec Product Upload</h2>

<input type="text" id="name" placeholder="Product Name" required><br>
<textarea id="description" placeholder="Description"></textarea><br>
<input type="number" id="price" placeholder="Price"><br>
<input type="text" id="image" placeholder="Image URL"><br>

<button onclick="submitProduct()">Submit Product</button>

<br><br>
<svg id="barcode"></svg>

</div>

<script>

// 🔐 CHANGE THIS PASSWORD
const password = "tech";

function checkLogin() {
  const input = document.getElementById("adminPass").value;

  if (input === password) {
    document.getElementById("loginBox").style.display = "none";
    document.getElementById("mainContent").style.display = "block";
  } else {
    alert("Wrong password");
  }
}

function submitProduct() {

  const name = document.getElementById("name").value;
  const description = document.getElementById("description").value;
  const price = document.getElementById("price").value;
  const image = document.getElementById("image").value;

  const barcodeValue = "TEC" + Date.now();

  JsBarcode("#barcode", barcodeValue, {
    format: "CODE128",
    displayValue: true
  });

  fetch("YOUR_WEBHOOK_URL_HERE", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      name: name,
      description: description,
      price: price,
      image: image,
      barcode: barcodeValue,
      date: new Date().toLocaleString()
    })
  })
  .then(response => {
    alert("Product Uploaded Successfully!");
  })
  .catch(error => {
    alert("Error uploading product.");
  });

}

</script>

</body>
</html>
